seed: 111
env_init_seed: 1
eval_init_seed: 2

num_train_steps: 50000
num_envs: 16

agent:
  learning_rate: 3e-4
  baseline_learning_rate: 1e-4
  tlm_backward_learning_rate: 3e-5
  tlm_use_target_ema: false
  tlm_ema_tau: 0.005
  tlm_n_batches: 1
  tlm_n_grad_steps: 4
  tlm_num_splits: 1
  start_eps: 0.0
  end_eps: 0.0
  exploration_steps: 0 # Should be <= of num_train_steps
  gae_lambda: 0.7
  ppo_policy_epochs: 2
  ppo_baseline_epochs: 4
  ppo_baseline_num_splits: 2
  clip_eps: 0.2
  train_backward: true

network:
  # Input size and output size are computed based on the environment
  hidden_size: 256
  depth: 2

metrics:
  n_rounds : 10
  batch_size: 1024

logging:
  track_each: 1000 # in terms of total training steps, not divided by num_envs
  eval_each: 100 # in terms of total training steps, not divided by num_envs
  metric_buffer_size: 200000
  tqdm_print_rate: 20
  use_writer: true
  log_dir: null # If null, dir will be automatically created
  checkpoint_dir: null # If null, dir will be automatically created

# Technical information for writer
writer:
  writer_type: null # wandb, trackio or null (no logging online)
  save_locally: true # Save metrics locally or not
  entity: azykova-myzina
  project: qm9
  offline_directory: ./comet_offline_logs

# Technical information for hydra
hydra:
  run:
    dir: ./tmp/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ./tmp/${now:%Y-%m-%d}/${now:%H-%M-%S}